<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TV Libre Paraguay</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="player-section" aria-label="Reproductor">
        <nav class="mode-tabs" aria-label="Secciones">
          <button id="tvModeButton" class="mode-tab is-active" type="button">TV</button>
          <button id="latamModeButton" class="mode-tab" type="button">LATAM</button>
          <button id="radioModeButton" class="mode-tab" type="button">Radios</button>
        </nav>

        <div class="brand-row">
          <div>
            <h1 id="appTitle">TV Libre Paraguay</h1>
            <p id="appSubtitle">Canales en vivo</p>
          </div>
          <div class="count-box">
            <strong id="itemCount">0</strong>
            <span id="itemCountLabel">canales</span>
          </div>
        </div>

        <div id="playerCard" class="player-card">
          <video id="videoPlayer" controls playsinline></video>
          <audio id="audioPlayer" controls></audio>
          <div id="playerOverlay" class="player-overlay">
            <strong>Selecciona un canal</strong>
            <span>La reproducción aparecerá aquí.</span>
          </div>
        </div>

        <div class="now-playing">
          <div>
            <span id="nowPlayingEyebrow" class="eyebrow">Reproduciendo</span>
            <h2 id="nowPlayingName">Ningún canal seleccionado</h2>
            <p id="nowPlayingMeta">Busca y elige un canal de la lista.</p>
          </div>
          <button id="fullscreenButton" class="primary-button" type="button">Pantalla completa</button>
        </div>

        <div class="player-controls">
          <div id="lastItemSlot"></div>

          <div>
            <span id="categoryLabel" class="filter-label">Categoría</span>
            <div id="categoryChips" class="category-chips"></div>
          </div>

          <button id="favoritesFilterButton" class="chip favorite-filter" type="button">Favoritos (0)</button>
        </div>

        <p id="statusMessage" class="status-message" role="status"></p>
      </section>

      <section class="channels-section" aria-label="Lista">
        <div class="filters">
          <label class="search-box">
            <span id="searchLabel">Buscar canal</span>
            <input id="searchInput" type="search" placeholder="Nombre del canal" autocomplete="off">
          </label>
        </div>

        <div class="list-header">
          <strong id="resultsCount">Mostrando 0 canales</strong>
          <span id="keyboardHint">Enter/OK reproduce el canal seleccionado</span>
        </div>

        <div id="itemGrid" class="channel-grid" aria-live="polite"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
